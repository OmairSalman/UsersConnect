version: '3.8'

services:
  app:
    image: omairsalman/usersconnect:latest
    ports:
      - "3000:3000"
    volumes:
      - ./config.yaml:/app/config.yaml
      - logs:/app/logs
    environment:
      - NODE_ENV=production
      # Generate secrets with: openssl rand -hex 32
      - ACCESS_TOKEN_SECRET=change-this-to-random-secret-min-32-chars
      - REFRESH_TOKEN_SECRET=change-this-to-random-secret-min-32-chars
      - DATABASE_HOST=mysql
      - DATABASE_USERNAME=root
      - DATABASE_PASSWORD=yourpassword
      - DATABASE_NAME=usersconnect
      - REDIS_HOST=redis
      - REDIS_PASSWORD=

      # ===========================================
      # CORS (optional — for a separate Angular/React frontend)
      # Uncomment and set when the API is consumed by a separate frontend.
      # ===========================================
      # - CORS_ENABLED=true
      # - CORS_ALLOWED_ORIGINS=http://localhost:4200,https://app.example.com
      # - CORS_ALLOW_CREDENTIALS=true
      # - CORS_ALLOWED_METHODS=GET,POST,PUT,DELETE,OPTIONS
      # - CORS_ALLOWED_HEADERS=Content-Type,Authorization,Accept
    depends_on:
      - mysql
      - redis
    restart: unless-stopped

  mysql:
    image: mysql:8
    environment:
      - MYSQL_ROOT_PASSWORD=yourpassword
      - MYSQL_DATABASE=usersconnect
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  logs:
